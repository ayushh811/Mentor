<!DOCTYPE html>
<html>

<head>
    <title>Mentora Login</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #6c5ce7, #2c2c54);
            height: 100vh;
            color: white;
        }

        .header {
            text-align: center;
            padding-top: 30px;
        }

        .header h1 {
            font-size: 50px;
        }

        .header p {
            margin-top: 8px;
            opacity: 0.8;
        }

        .main {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: calc(100vh - 120px);
            padding: 0 60px;
        }

        .left img {
            width: 350px;
            border-radius: 15px;
        }

        .center {
            max-width: 350px;
            text-align: center;
        }

        .center img {
            width: 120px;
            margin-bottom: 15px;
        }

        .center h2 {
            margin-bottom: 10px;
        }

        .center p {
            opacity: 0.8;
            margin-bottom: 20px;
        }

        .explore-btn {
            padding: 10px 20px;
            background: orange;
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
        }

        .container {
            width: 300px;
            background: white;
            color: black;
            padding: 25px;
            border-radius: 15px;
        }

        .container h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        form {
            display: flex;
            flex-direction: column;
        }

        input {
            padding: 10px;
            margin-bottom: 12px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            padding: 10px;
            background: #6c5ce7;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div class="header">
        <h1>MENTORA</h1>
        <p>Learn AI tools faster and smarter</p>
    </div>

    <div class="main">

        <div class="left">
            <img src="mentora.png" alt="Mentora"> 
        </div>

        <div class="center">
            <img src="Courses.png" alt="Courses" target="_blank">
            <h2>Build Skills That Matter</h2>
            <p>Master AI tools, coding, and real-world skills.</p>
            <button class="explore-btn">Explore</button>
        </div>

        <div class="container">
            <h2>Login</h2>

            <!-- 🔥 THIS LINE DOES REDIRECT -->
            <form action="index.html">
                <input type="text" placeholder="Enter your name">
                <input type="email" placeholder="Enter your email">
                <input type="password" placeholder="Enter your password">
                <button type="submit">Login</button>
            </form>

        </div>

    </div>

</body>

</html>
